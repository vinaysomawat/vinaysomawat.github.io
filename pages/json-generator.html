<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Resume JSON Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css?family=Montserrat|Open+Sans|Raleway&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.5/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="../css/animate.css" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/json-generator.css" />
</head>

<body>
  <div class="home-link-wrapper">
    <a href="../index.html" class="home-link">
      <i class="fa-solid fa-arrow-left"></i> Home
    </a>
  </div>

  <div class="colorlib-narrow-content generator-section">
    <div class="row row-bottom-padded-sm animate-box" data-animate-effect="fadeInLeft">
      <div class="about-desc generator-hero">
        <h1>Resume JSON <span style="color: #f9bf3f">Generator</span></h1>
        <p>Generate structured JSON data for your portfolio website</p>
      </div>
    </div>

    <form id="resumeForm">
      <!-- Bio -->
      <fieldset>
        <div class="legend">Bio</div>
        <div id="bioFields">
          <textarea name="bio"></textarea>
        </div>
        <button type="button" class="btn btn-default" id="addBioLine">
          <i class="fa fa-plus"></i> Add Bio Line
        </button>
      </fieldset>

      <!-- Skills -->
      <fieldset>
        <div class="legend">Skills</div>
        <select id="skillsSelect" multiple size="20"></select>
        <input type="text" id="newSkill" placeholder="Add new skill..." />
        <button type="button" class="btn btn-primary" id="addSkill">
          <i class="fa fa-plus"></i> Add Skill
        </button>
      </fieldset>

      <!-- Experience -->
      <fieldset>
        <div class="legend">Experience</div>
        <div id="experienceFields"></div>
        <button type="button" class="btn btn-default" id="addExperience">
          <i class="fa fa-plus"></i> Add Experience
        </button>
      </fieldset>

      <!-- Education -->
      <fieldset>
        <div class="legend">Education</div>
        <div id="educationFields"></div>
        <button type="button" class="btn btn-default" id="addEducation">
          <i class="fa fa-plus"></i> Add Education
        </button>
      </fieldset>

      <!-- Adventures -->
      <fieldset>
        <div class="legend">Adventures</div>
        <div id="adventureFields"></div>
        <button type="button" class="btn btn-default" id="addAdventureGroup">
          <i class="fa fa-plus"></i> Add Adventure Group
        </button>
      </fieldset>

      <!-- Contact Links -->
      <fieldset>
        <div class="legend">Contact Links</div>
        <div id="contactFields"></div>
        <button type="button" class="btn btn-default" id="addContact">
          <i class="fa fa-plus"></i> Add Contact Link
        </button>
      </fieldset>

      <!-- Footer -->
      <fieldset>
        <div class="legend">Footer</div>
        <div id="footerFields"></div>
        <button type="button" class="btn btn-default" id="addFooter">
          <i class="fa fa-plus"></i> Add Footer Section
        </button>
      </fieldset>

      <div class="form-actions">
        <button type="submit" class="btn btn-success">
          <i class="fa fa-code"></i> Generate JSON
        </button>
        <button type="button" class="btn btn-info" id="copyJson">
          <i class="fa fa-copy"></i> Copy to Clipboard
        </button>
      </div>
    </form>

    <pre id="output"></pre>

    <script type="module" src="../js/json-generator.js"></script>
</body>

</html>
